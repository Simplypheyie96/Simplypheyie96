name: Update Currently Reading

on:
  schedule:
    - cron: '0 6 * * *'  # runs daily at 6am UTC
  workflow_dispatch:      # allow manual trigger

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Goodreads RSS and update README
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import xml.etree.ElementTree as ET
          import re

          url = "https://www.goodreads.com/review/list_rss/79687941?shelf=currently-reading"
          req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})

          try:
              with urllib.request.urlopen(req, timeout=15) as response:
                  xml_content = response.read()

              root = ET.fromstring(xml_content)
              items = root.findall('.//item')

              if items:
                  title_el = items[0].find('title')
                  raw_title = title_el.text.strip() if title_el is not None else ""
                  # Strip series info like "(Series, #N)"
                  title = re.sub(r'\s*\(.*?\)\s*$', '', raw_title).strip()

                  # Try to find author in description or content:encoded
                  author = ""
                  for tag in ['description', '{http://purl.org/rss/1.0/modules/content/}encoded']:
                      el = items[0].find(tag)
                      if el is not None and el.text:
                          m = re.search(r'author:\s*([^<\n]+)', el.text, re.IGNORECASE)
                          if m:
                              author = m.group(1).strip()
                              break

                  if author:
                      replacement = f"*{title}* — {author}"
                  else:
                      replacement = f"*{title}*"
              else:
                  replacement = "Between books 📖"

          except Exception as e:
              print(f"Error fetching RSS: {e}")
              exit(0)

          with open('README.md', 'r', encoding='utf-8') as f:
              readme = f.read()

          pattern = r'(<!-- GOODREADS-CURRENTLY-READING:START -->).*?(<!-- GOODREADS-CURRENTLY-READING:END -->)'
          new_readme = re.sub(pattern, rf'\g<1>{replacement}\g<2>', readme, flags=re.DOTALL)

          if new_readme == readme:
              print("No change detected.")
          else:
              with open('README.md', 'w', encoding='utf-8') as f:
                  f.write(new_readme)
              print(f"Updated to: {replacement}")
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet && echo "Nothing to commit" || \
            (git commit -m "📚 update: currently reading from Goodreads" && git push)
